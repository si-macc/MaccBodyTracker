<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A7A99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B5B7A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)"/>
  <!-- Measurement icon - stylized ruler/body -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical line -->
    <line x1="50" y1="25" x2="50" y2="75"/>
    <!-- Horizontal line -->
    <line x1="30" y1="50" x2="70" y2="50"/>
    <!-- Tick marks -->
    <line x1="50" y1="25" x2="60" y2="35"/>
    <line x1="50" y1="25" x2="40" y2="35"/>
    <line x1="30" y1="50" x2="40" y2="40"/>
    <line x1="30" y1="50" x2="40" y2="60"/>
    <line x1="70" y1="50" x2="60" y2="40"/>
    <line x1="70" y1="50" x2="60" y2="60"/>
    <line x1="50" y1="75" x2="60" y2="65"/>
    <line x1="50" y1="75" x2="40" y2="65"/>
  </g>
</svg>
